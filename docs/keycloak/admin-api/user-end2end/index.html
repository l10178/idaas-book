operty="article:modified_time" content="2026-06-30T18:45:09+08:00"><meta property="og:site_name" content="IDaaS Book"><meta name=twitter:card content="summary_large_image"><meta name=twitter:image content="https://idaas.xlabs.club/cover.png"><meta name=twitter:title content="用户增删改查"><meta name=twitter:description content="Keycloak Admin REST API：用户增加修改删除"><meta name=twitter:site content="@xlabs-club"><script type=application/ld+json>{"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","item":"https://idaas.xlabs.club/","name":"Idaa S 身份即服务 —— 一本完整的书","position":1},{"@type":"ListItem","item":"https://idaas.xlabs.club/docs/","name":"Docs","position":2},{"@type":"ListItem","item":"https://idaas.xlabs.club/docs/keycloak/","name":"Keycloak","position":3},{"@type":"ListItem","item":"https://idaas.xlabs.club/docs/keycloak/admin-api/","name":"Admin API","position":4},{"@type":"ListItem","name":"用户增删改查","position":5}]}</script></head><body class="single section docs"><p>Keycloak Admin REST API，curl 模拟用户增加修改删除的完整例子。</p><div class=expressive-code><figure class="frame is-terminal not-content"><figcaption class=header><span class=title></span></figcaption><div class=highlight><pre tabindex=0 class=chroma><code class=language-bash data-lang=bash><span class=line><span class=cl><span class=cp>#!/bin/bash
</span></span></span><span class=line><span class=cl>
</span></span><span class=line><span class=cl><span class=nv>HOST_IP</span><span class=o>=</span>127.0.0.1
</span></span><span class=line><span class=cl><span class=nv>HOST_NAME</span><span class=o>=</span>keycloak.example
</span></span><span class=line><span class=cl><span class=nv>DEFAULT_REALM</span><span class=o>=</span>master
</span></span><span class=line><span class=cl><span class=nv>ADMIN_API_URL</span><span class=o>=</span>http://<span class=si>${</span><span class=nv>HOST_IP</span><span class=si>}</span>/auth/admin/realms/<span class=si>${</span><span class=nv>DEFAULT_REALM</span><span class=si>}</span>
</span></span><span class=line><span class=cl><span class=nv>USER_API_URL</span><span class=o>=</span><span class=si>${</span><span class=nv>ADMIN_API_URL</span><span class=si>}</span>/users
</span></span><span class=line><span class=cl>
</span></span><span class=line><span class=cl><span class=c1># admin user</span>
</span></span><span class=line><span class=cl><span class=nv>ADMIN_NAME</span><span class=o>=</span>xxx
</span></span><span class=line><span class=cl><span class=nv>ADMIN_PWD</span><span class=o>=</span>xxx
</span></span><span class=line><span class=cl>
</span></span><span class=line><span class=cl>parse_json<span class=o>()</span> <span class=o>{</span>
</span></span><span class=line><span class=cl> <span class=nb>echo</span> <span class=s2>&#34;</span><span class=si>${</span><span class=nv>1</span><span class=p>//</span><span class=se>\&#34;</span><span class=p>/</span><span class=si>}</span><span class=s2>&#34;</span> <span class=p>|</span> sed <span class=s2>&#34;s/.*</span><span class=nv>$2</span><span class=s2>:\([^,}]*\).*/\1/&#34;</span>
</span></span><span class=line><span class=cl><span class=o>}</span>
</span></span><span class=line><span class=cl>
</span></span><span class=line><span class=cl><span class=nb>echo</span> <span class=s2>&#34;====Begin test user CRUD====&#34;</span>
</span></span><span class=line><span class=cl>
</span></span><span class=line><span class=cl><span class=nv>token_url</span><span class=o>=</span>http://<span class=si>${</span><span class=nv>HOST_IP</span><span class=si>}</span>/auth/realms/<span class=si>${</span><span class=nv>DEFAULT_REALM</span><span class=si>}</span>/protocol/openid-connect/token
</span></span><span class=line><span class=cl><span class=c1># Get token, a json</span>
</span></span><span class=line><span class=cl><span class=nv>token_json</span><span class=o>=</span><span class=k>$(</span>curl -X POST <span class=se>\
</span></span></span><span class=line><span class=cl> -H <span class=s2>&#34;host:</span><span class=si>${</span><span class=nv>HOST_NAME</span><span class=si>}</span><span class=s2>&#34;</span> <span class=se>\
</span></span></span><span class=line><span class=cl> -H <span class=s2>&#34;Content-Type: application/x-www-form-urlencoded&#34;</span> <span class=se>\
</span></span></span><span class=line><span class=cl> <span class=si>${</span><span class=nv>token_url</span><span class=si>}</span> <span class=se>\
</span></span></span><span class=line><span class=cl> --data <span class=s1>&#39;grant_type=password&#39;</span> <span class=se>\
</span></span></span><span class=line><span class=cl> --data <span class=s1>&#39;client_id=admin-cli&#39;</span> <span class=se>\
</span></span></span><span class=line><span class=cl> --data <span class=s2>&#34;username=</span><span class=si>${</span><span class=nv>ADMIN_NAME</span><span class=si>}</span><span class=s2>&#34;</span> <span class=se>\
</span></span></span><span class=line><span class=cl> --data <span class=s2>&#34;password=</span><span class=si>${</span><span class=nv>ADMIN_PWD</span><span class=si>}</span><span class=s2>&#34;</span><span class=k>)</span>
</span></span><span class=line><span class=cl>
</span></span><span class=line><span class=cl><span class=c1># get the `access_token` from the json</span>
</span></span><span class=line><span class=cl><span class=nv>token</span><span class=o>=</span><span class=k>$(</span>parse_json <span class=s2>&#34;</span><span class=nv>$token_json</span><span class=s2>&#34;</span> <span class=s2>&#34;access_token&#34;</span><span class=k>)</span>
</span></span><span class=line><span class=cl>
</span></span><span class=line><span class=cl><span class=c1># List users</span>
</span></span><span class=line><span class=cl>curl -X GET -H <span class=s2>&#34;Authorization: Bearer </span><span class=si>${</span><span class=nv>token</span><span class=si>}</span><span class=s2>&#34;</span> <span class=se>\
</span></span></span><span class=line><span class=cl> -H <span class=s2>&#34;host:</span><span class=si>${</span><span class=nv>HOST_NAME</span><span class=si>}</span><span class=s2>&#34;</span> <span class=se>\
</span></span></span><span class=line><span class=cl> <span class=si>${</span><span class=nv>USER_API_URL</span><span class=si>}</span> -v
</span></span><span class=line><span class=cl>
</span></span><span class=line><span class=cl><span class=c1># Add new user</span>
</span></span><span class=line><span class=cl><span class=nv>username</span><span class=o>=</span>usertest<span class=k>$(</span>date <span class=s2>&#34;+%Y%m%d%H%M%S%s&#34;</span><span class=k>)</span>
</span></span><span class=line><span class=cl><span class=nv>user</span><span class=o>={</span><span class=se>\&#34;</span>enabled<span class=se>\&#34;</span>:true,<span class=se>\&#34;</span>attributes<span class=se>\&#34;</span>:<span class=o>{}</span>,<span class=se>\&#34;</span>username<span class=se>\&#34;</span>:<span class=se>\&#34;</span><span class=si>${</span><span class=nv>username</span><span class=si>}</span><span class=se>\&#34;</span>,<span class=se>\&#34;</span>emailVerified<span class=se>\&#34;</span>:<span class=se>\&#34;\&#34;</span><span class=o>}</span>
</span></span><span class=line><span class=cl>
</span></span><span class=line><span class=cl><span class=nb>echo</span> <span class=s2>&#34;Begin create new user </span><span class=si>${</span><span class=nv>username</span><span class=si>}</span><span class=s2>.&#34;</span>
</span></span><span class=line><span class=cl>
</span></span><span class=line><span class=cl><span class=nv>user_create_rsp</span><span class=o>=</span><span class=k>$(</span>curl -i -s -H <span class=s2>&#34;Authorization: Bearer </span><span class=si>${</span><span class=nv>token</span><span class=si>}</span><span class=s2>&#34;</span> <span class=se>\
</span></span></span><span class=line><span class=cl> -H <span class=s2>&#34;host:</span><span class=si>${</span><span class=nv>HOST_NAME</span><span class=si>}</span><span class=s2>&#34;</span> <span class=se>\
</span></span></span><span class=line><span class=cl> -H <span class=s2>&#34;Content-Type: application/json&#34;</span> <span class=se>\
</span></span></span><span class=line><span class=cl> --data <span class=s2>&#34;</span><span class=si>${</span><span class=nv>user</span><span class=si>}</span><span class=s2>&#34;</span> <span class=se>\
</span></span></span><span class=line><span class=cl> <span class=si>${</span><span class=nv>USER_API_URL</span><span class=si>}</span> --stderr -<span class=k>)</span>
</span></span><span class=line><span class=cl>
</span></span><span class=line><span class=cl><span class=c1># Get user id full url from response header `Location`</span>
</span></span><span class=line><span class=cl><span class=c1># &lt; Location: http://xxxx/users/9e901054-bbc7-47db-8a68-4a13474a1080</span>
</span></span><span class=line><span class=cl><span class=c1># The `tr -d` is to fix `Error curl: (3) URL using bad/illegal format or missing URL`</span>
</span></span><span class=line><span class=cl><span class=nv>user_id_url</span><span class=o>=</span><span class=k>$(</span><span class=nb>echo</span> <span class=s2>&#34;</span><span class=si>${</span><span class=nv>user_create_rsp</span><span class=si>}</span><span class=s2>&#34;</span> <span class=p>|</span> grep -Fi Location <span class=p>|</span> tr -d <span class=s1>&#39;\r&#39;</span> <span class=p>|</span> awk <span class=s1>&#39;{print $2}&#39;</span><span class=k>)</span>
</span></span><span class=line><span class=cl>
</span></span><span class=line><span class=cl><span class=c1># Get only the id from the url</span>
</span></span><span class=line><span class=cl><span class=nv>user_id</span><span class=o>=</span><span class=k>$(</span><span class=nb>echo</span> <span class=si>${</span><span class=nv>user_id_url</span><span class=si>}</span> <span class=p>|</span> awk -F<span class=s1>&#39;/&#39;</span> <span class=s1>&#39;{print $NF}&#39;</span><span class=k>)</span>
</span></span><span class=line><span class=cl><span class=nb>echo</span> <span class=s2>&#34;User id is </span><span class=si>${</span><span class=nv>user_id</span><span class=si>}</span><span class=s2> .&#34;</span>
</span></span><span class=line><span class=cl>
</span></span><span class=line><span class=cl><span class=c1># Delete user by id</span>
</span></span><span class=line><span class=cl>curl -X DELETE -H <span class=s2>&#34;Authorization: Bearer </span><span class=si>${</span><span class=nv>token</span><span class=si>}</span><span class=s2>&#34;</span> <span class=se>\
</span></span></span><span class=line><span class=cl> -H <span class=s2>&#34;host:</span><span class=si>${</span><span class=nv>HOST_NAME</span><span class=si>}</span><span class=s2>&#34;</span> <span class=se>\
</span></span></span><span class=line><span class=cl> -H <span class=s2>&#34;Content-Type: application/json&#34;</span> <span class=se>\
</span></span></span><span class=line><span class=cl> <span class=s2>&#34;</span><span class=si>${</span><span class=nv>USER_API_URL</span><span class=si>}</span><span class=s2>/</span><span class=si>${</span><span class=nv>user_id</span><span class=si>}</span><span class=s2>&#34;</span>
</span></span><span class=line><span class=cl>
</span></span><span class=line><span class=cl><span class=nb>echo</span> <span class=s2>&#34;====End test user CRUD====&#34;</span></span></span></code></pre></div></figure></div><p>This line is from <code>./layouts/_default/single.html</code>.</p><script async src=/js/bootstrap.c673c84373e66019f7895efc74b3b3b940071832aaa8a85e73218087d535e71b.js integrity="sha256-xnPIQ3PmYBn3iV78dLOzuUAHGDKqqKhecyGAh9U15xs="></script><script async src=/js/app.e7d20ccb7d77f6f38a3bfb54b89e1f71b044d2122fde5645cdf7291fc237a862.js integrity="sha256-59IMy3139vOKO/tUuJ4fcbBE0hIv3lZFzfcpH8I3qGI="></script></body></html>
